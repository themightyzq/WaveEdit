name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CMAKE_VERSION: '3.27'
  NINJA_VERSION: '1.11.1'
  CCACHE_VERSION: '4.8'

jobs:
  # ============================================================================
  # macOS Build
  # ============================================================================
  build-macos:
    name: macOS Universal
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: brew install sound-touch lame

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.x'

      - name: Configure CMake
        run: cmake -B build -G "Xcode" -DCMAKE_BUILD_TYPE=Release

      - name: Verify MP3 encoder enabled
        shell: bash
        run: |
          # MP3 must be compiled into every shipped binary; fail loudly rather
          # than silently shipping without it (WAVEEDIT_MP3_ENABLED is set by
          # CMakeLists when LAME lib+header are found).
          if grep -q "WAVEEDIT_MP3_ENABLED:INTERNAL=TRUE" build/CMakeCache.txt; then
            echo "MP3 encoder verified enabled."
          else
            echo "::error::LAME not found -- MP3 export would ship DISABLED."
            exit 1
          fi

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Verify build output
        run: |
          echo "Checking build artifacts..."
          if [ -e "build/WaveEdit_artefacts/Release/WaveEdit.app" ]; then
            echo "✅ Build artifact found"
            ls -lh build/WaveEdit_artefacts/Release/WaveEdit.app
          else
            echo "❌ Build artifact not found"
            find build -type f -name "WaveEdit*"
            exit 1
          fi

      - name: Package macOS app
        run: |
          cd build/WaveEdit_artefacts/Release
          zip -r ../../../WaveEdit-macOS-universal.zip WaveEdit.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveEdit-macOS-universal
          path: WaveEdit-macOS-universal.zip
          retention-days: 30

  # ============================================================================
  # Windows Build
  # ============================================================================
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies (vcpkg)
        shell: bash
        run: |
          # vcpkg is preinstalled on windows-latest at C:/vcpkg.
          # Install SoundTouch (LGPL-2.1) — required for time-stretch / pitch-shift.
          vcpkg install soundtouch:x64-windows mp3lame:x64-windows

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.x'

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: bash
        run: |
          # Use Ninja + the MSVC environment set up by msvc-dev-cmd above (which
          # puts cl.exe / link.exe on PATH via GITHUB_ENV/GITHUB_PATH). Earlier
          # attempts failed two ways: no -G fell back to NMake ("CMAKE_C_COMPILER
          # not set"), and -G "Visual Studio 17 2022" couldn't be located by the
          # standalone CMake under Git Bash ("could not find any instance of
          # Visual Studio"). Ninja sidesteps VS-generator detection entirely.
          # Single-config: CMAKE_BUILD_TYPE=Release drives JUCE's
          # <target>_artefacts/Release/ layout the later steps expect.
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Verify MP3 encoder enabled
        shell: bash
        run: |
          # MP3 must be compiled into every shipped binary; fail loudly rather
          # than silently shipping without it (WAVEEDIT_MP3_ENABLED is set by
          # CMakeLists when LAME lib+header are found).
          if grep -q "WAVEEDIT_MP3_ENABLED:INTERNAL=TRUE" build/CMakeCache.txt; then
            echo "MP3 encoder verified enabled."
          else
            echo "::error::LAME not found -- MP3 export would ship DISABLED."
            exit 1
          fi

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Verify build output
        shell: bash
        run: |
          echo "Checking build artifacts..."
          if [ -e "build/WaveEdit_artefacts/Release/WaveEdit.exe" ]; then
            echo "✅ Build artifact found"
            ls -lh build/WaveEdit_artefacts/Release/WaveEdit.exe
          else
            echo "❌ Build artifact not found"
            find build -type f -name "WaveEdit*"
            exit 1
          fi

      - name: Package Windows executable
        shell: bash
        run: |
          cd build/WaveEdit_artefacts/Release
          7z a ../../../WaveEdit-Windows-x64.zip WaveEdit.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveEdit-Windows-x64
          path: WaveEdit-Windows-x64.zip
          retention-days: 30

  # ============================================================================
  # Linux Build
  # ============================================================================
  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libsoundtouch-dev \
            libmp3lame-dev

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.x'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Verify MP3 encoder enabled
        shell: bash
        run: |
          # MP3 must be compiled into every shipped binary; fail loudly rather
          # than silently shipping without it (WAVEEDIT_MP3_ENABLED is set by
          # CMakeLists when LAME lib+header are found).
          if grep -q "WAVEEDIT_MP3_ENABLED:INTERNAL=TRUE" build/CMakeCache.txt; then
            echo "MP3 encoder verified enabled."
          else
            echo "::error::LAME not found -- MP3 export would ship DISABLED."
            exit 1
          fi

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Verify build output
        run: |
          echo "Checking build artifacts..."
          if [ -e "build/WaveEdit_artefacts/Release/WaveEdit" ]; then
            echo "✅ Build artifact found"
            ls -lh build/WaveEdit_artefacts/Release/WaveEdit
          else
            echo "❌ Build artifact not found"
            find build -type f -name "WaveEdit*"
            exit 1
          fi

      - name: Package Linux binary
        run: |
          cd build/WaveEdit_artefacts/Release
          tar -czf ../../../WaveEdit-Linux-x64.tar.gz WaveEdit

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaveEdit-Linux-x64
          path: WaveEdit-Linux-x64.tar.gz
          retention-days: 30

  # ============================================================================
  # Build Summary
  # ============================================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Universal | ${{ needs.build-macos.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-windows.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | ${{ needs.build-linux.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Publish GitHub Release  (only on v* tags)
  # ============================================================================
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WaveEdit ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/WaveEdit-macOS-universal/WaveEdit-macOS-universal.zip
            artifacts/WaveEdit-Windows-x64/WaveEdit-Windows-x64.zip
            artifacts/WaveEdit-Linux-x64/WaveEdit-Linux-x64.tar.gz
          body: |
            Pre-built binaries for macOS, Windows, and Linux.

            **macOS** — unsigned `.app` bundle. On first launch macOS will
            say "WaveEdit can't be opened because Apple cannot check it
            for malicious software." Right-click the app → **Open** →
            **Open**. You only need to do this once.

            **Windows** — unsigned `.exe`. Windows SmartScreen may warn
            on first launch; click **More info** → **Run anyway**.

            **Linux** — tarball containing the `WaveEdit` binary.
            `chmod +x WaveEdit` and run.

            All builds bundle the LAME MP3 encoder; no extra install is
            required. See the [README](https://github.com/themightyzq/WaveEdit/blob/main/README.md)
            for build-from-source instructions and keyboard shortcuts.
